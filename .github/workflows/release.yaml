name: release

permissions:
  contents: write

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  create-release:
    if: false
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v2
        with:
          fetch-depth: 0

      # Resolve the pushed tag back to its annotated message (if any).
      # Lightweight tags have no message; the release body falls back to
      # empty in that case, matching what `gh release create` would do.
      - id: tag-msg
        run: |
          git fetch --tags --force --no-recurse-submodules
          msg=$(git for-each-ref --format='%(contents)' refs/tags/${{ github.ref_name }})
          {
            echo 'msg<<TANGO_TAG_MSG_EOF'
            echo "$msg"
            echo 'TANGO_TAG_MSG_EOF'
          } >> "$GITHUB_OUTPUT"

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body: ${{ steps.tag-msg.outputs.msg }}
          # Semver prereleases carry a `-` after the version number
          # (e.g. v1.0.0-alpha.0, v5.0.0-beta.3); a plain `v1.2.3`
          # never contains `-`, so tag-name search is a clean check.
          prerelease: ${{ contains(github.ref_name, '-') }}

  release-win32-x64:
    if: false
    runs-on: windows-2022
    needs: create-release
    env:
      CMAKE_POLICY_VERSION_MINIMUM: 3.5
      # libdatachannel-sys -> openssl-src runs `perl ./Configure` to build
      # OpenSSL from source. The build runs under Git Bash, whose MSYS perl
      # (/usr/bin/perl) lacks core modules OpenSSL's Configure needs. Point
      # openssl-src at the full Strawberry Perl preinstalled on the runner.
      OPENSSL_SRC_PERL: C:\Strawberry\perl\bin\perl.exe

    steps:
      - uses: actions/checkout@v2
        with:
          submodules: recursive

      - run: git fetch --tags --force --no-recurse-submodules

      - uses: pat-s/always-upload-cache@v2
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: win32-x64-msvc-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Install Protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      # Source MSVC vcvars (cl.exe / link.exe / nmake.exe / Windows SDK)
      # into the rest of the workflow so cmake + cc-rs all pick up the
      # same MSVC toolset.
      - uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: x86_64-pc-windows-msvc

      - name: Install Python build deps
        run: pip install semver==3.0.0-dev3 toml mako

      - name: Build
        shell: bash
        run: ./win/build.sh

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: |
            ./dist/trill-x86_64-windows.exe

  release-mac-universal:
    if: false
    runs-on: macos-14
    needs: create-release
    env:
      CMAKE_POLICY_VERSION_MINIMUM: 3.5

    steps:
      - uses: actions/checkout@v2
        with:
          submodules: recursive

      - run: git fetch --tags --force --no-recurse-submodules

      - uses: pat-s/always-upload-cache@v2
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            core/target
          key: darwin-universal-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Install Protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: x86_64-apple-darwin, aarch64-apple-darwin

      # using venv to avoid: "The directory '/Users/runner/Library/Caches/pip' or its parent directory is not owned or is not writable by the current user"
      - name: Build
        run: |
          python3 -m venv ./macos/venv
          source ./macos/venv/bin/activate
          python3 -m pip install semver==3.0.0-dev3 toml dmgbuild pyobjc-framework-Quartz mako
          ./macos/build.sh

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: |
            ./dist/trill-macos_unsigned.dmg

  release-linux-x86_64:
    if: false
    runs-on: ubuntu-22.04 # Ubuntu 22.04 is used for higher glibc compatibility across users
    needs: create-release
    env:
      CMAKE_POLICY_VERSION_MINIMUM: 3.5

    steps:
      - uses: actions/checkout@v2
        with:
          submodules: recursive

      - run: git fetch --tags --force --no-recurse-submodules

      - uses: pat-s/always-upload-cache@v2
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            core/target
          key: linux-x86_64-cargo-${{ hashFiles('**/Cargo.lock') }}

      - run: |
          sudo pip3 install semver==3.0.0-dev3 toml mako

      - name: Install Protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: x86_64-unknown-linux-gnu

      - name: Build
        run: |
          sudo apt-get update -y
          sudo apt-get upgrade -y
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y alsa build-essential clang cmake curl fuse git libnss3 librust-atk-dev librust-gdk-pixbuf-dev librust-gdk-sys-dev librust-pango-dev libsdl2-dev pkgconf sudo wget

      - run: ./linux/build.sh

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: ./dist/trill-x86_64-linux.AppImage

  release-linux-arm64:
    runs-on: ubuntu-22.04-arm
    needs: create-release

    steps:
      - uses: actions/checkout@v2
        with:
          submodules: recursive

      - run: git fetch --tags --force --no-recurse-submodules

      # Persist crate downloads and compile output across runs. The container
      # build mounts the runner's ~/.cargo as its CARGO_HOME and writes target/
      # under the checked-out repo, so caching these host paths speeds up rebuilds.
      - uses: pat-s/always-upload-cache@v2
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: linux-arm64-1804docker-cargo-${{ hashFiles('**/Cargo.lock') }}

      # The build runs inside an Ubuntu 18.04 container (see the script) for
      # glibc compatibility. The toolchain (Rust, cmake, protoc) and system
      # libraries are all installed inside that container, so there are no
      # host-side setup steps here. Docker is preinstalled on the arm runner.
      - name: Build
        run: ./linux/build_arm64_1804docker.sh

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: ./dist/trill-aarch64-linux.AppImage

  release-win32-i686:
    if: false
    runs-on: windows-2022
    needs: create-release
    env:
      CMAKE_POLICY_VERSION_MINIMUM: 3.5
      # See release-win32-x64: force openssl-src to use Strawberry Perl
      # instead of the MSYS perl that Git Bash puts first on PATH.
      OPENSSL_SRC_PERL: C:\Strawberry\perl\bin\perl.exe

    steps:
      - uses: actions/checkout@v2
        with:
          submodules: recursive

      - run: git fetch --tags --force --no-recurse-submodules

      - uses: pat-s/always-upload-cache@v2
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: win32-i686-msvc-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Install Protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x86

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: i686-pc-windows-msvc

      - name: Install Python build deps
        run: pip install semver==3.0.0-dev3 toml mako

      - name: Build
        shell: bash
        run: ./win/build_i686.sh

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: |
            ./dist/trill-i686-windows.exe

  release-win32-arm64:
    if: false
    runs-on: windows-11-arm
    needs: create-release
    env:
      CMAKE_POLICY_VERSION_MINIMUM: 3.5
      # See release-win32-x64: force openssl-src to use Strawberry Perl.
      # NOTE: verify this path on the windows-11-arm image before enabling.
      OPENSSL_SRC_PERL: C:\Strawberry\perl\bin\perl.exe

    steps:
      - uses: actions/checkout@v2
        with:
          submodules: recursive

      - run: git fetch --tags --force --no-recurse-submodules

      - uses: pat-s/always-upload-cache@v2
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: win32-arm64-msvc-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Install Protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: arm64

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: aarch64-pc-windows-msvc

      - name: Install Python build deps
        run: pip install semver==3.0.0-dev3 toml mako

      - name: Build
        shell: bash
        run: ./win/build_arm64.sh

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: |
            ./dist/trill-aarch64-windows.exe
